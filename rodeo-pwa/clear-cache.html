<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Actualizar App — Los Aromos</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f5228;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 24px;
      padding: 36px 28px;
      max-width: 380px;
      width: 100%;
      text-align: center;
      backdrop-filter: blur(12px);
    }
    .emoji { font-size: 64px; line-height: 1; margin-bottom: 16px; }
    h1 { color: #fff; font-size: 24px; font-weight: 800; margin-bottom: 8px; }
    p  { color: rgba(255,255,255,0.75); font-size: 15px; margin-bottom: 24px; line-height: 1.5; }
    .log {
      background: rgba(0,0,0,0.35);
      border-radius: 12px;
      padding: 14px;
      text-align: left;
      font-size: 13px;
      color: #a8e6a3;
      font-family: monospace;
      margin-bottom: 20px;
      min-height: 90px;
      max-height: 200px;
      overflow-y: auto;
      line-height: 1.7;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 16px;
      border-radius: 14px;
      border: none;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: transform 0.1s, opacity 0.1s;
      margin-bottom: 10px;
    }
    .btn:active { transform: scale(0.97); }
    .btn-limpiar { background: #fff; color: #0f5228; }
    .btn-abrir   { background: rgba(255,255,255,0.2); color: #fff; }
    .btn:disabled { opacity: 0.55; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="card">
    <div class="emoji">🔄</div>
    <h1>Actualizar App</h1>
    <p>Limpia el caché, el Service Worker y la sesión guardada para que la app cargue la versión más nueva.</p>

    <div class="log" id="log">Analizando...</div>

    <button class="btn btn-limpiar" id="btn-limpiar" onclick="limpiarTodo()">
      🧹 Limpiar y actualizar
    </button>
    <button class="btn btn-abrir" id="btn-abrir" onclick="irAApp()" disabled>
      🐄 Abrir Los Aromos
    </button>
  </div>

  <script>
    const log = document.getElementById('log');

    function escribir(msg, tipo = 'ok') {
      const linea = document.createElement('div');
      const prefijo = tipo === 'ok' ? '✓' : tipo === 'warn' ? '⏳' : '✗';
      linea.textContent = prefijo + ' ' + msg;
      linea.style.color = tipo === 'ok' ? '#a8e6a3' : tipo === 'warn' ? '#ffd54f' : '#ef9a9a';
      log.appendChild(linea);
      log.scrollTop = log.scrollHeight;
    }

    async function limpiarTodo() {
      const btn = document.getElementById('btn-limpiar');
      btn.disabled = true;
      btn.textContent = '⏳ Limpiando...';
      log.innerHTML = '';

      try {
        // 1. Desregistrar Service Workers
        if ('serviceWorker' in navigator) {
          const regs = await navigator.serviceWorker.getRegistrations();
          for (const reg of regs) {
            await reg.unregister();
            escribir('SW desregistrado: ' + reg.scope);
          }
          if (!regs.length) escribir('Sin Service Workers activos');
        }

        // 2. Limpiar todos los cachés
        if ('caches' in window) {
          const nombres = await caches.keys();
          for (const nombre of nombres) {
            await caches.delete(nombre);
            escribir('Caché eliminado: ' + nombre);
          }
          if (!nombres.length) escribir('Sin cachés encontrados');
        }

        // 3. Limpiar localStorage (sesión de usuario, rol guardado)
        const operador = localStorage.getItem('rodeo_operador') || '(ninguno)';
        localStorage.clear();
        escribir('Sesión cerrada — era: ' + operador);

        escribir('¡Listo! Podés abrir la app ahora.');
        document.getElementById('btn-abrir').disabled = false;
        btn.textContent = '✓ Todo limpio';

      } catch (err) {
        escribir('Error: ' + err.message, 'error');
        btn.disabled = false;
        btn.textContent = '🧹 Intentar de nuevo';
      }
    }

    function irAApp() {
      window.location.href = '/?v=' + Date.now();
    }

    // Estado inicial
    (async () => {
      log.innerHTML = '';
      if ('serviceWorker' in navigator) {
        const regs = await navigator.serviceWorker.getRegistrations();
        const op = localStorage.getItem('rodeo_operador') || '(ninguno)';
        escribir(regs.length + ' SW activo(s) detectado(s)', regs.length ? 'warn' : 'ok');
        escribir('Usuario guardado: ' + op, 'warn');
        if (regs.length === 0 && !localStorage.getItem('rodeo_operador')) {
          document.getElementById('btn-abrir').disabled = false;
        }
      }
    })();
  </script>
</body>
</html>
